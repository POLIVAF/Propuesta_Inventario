<div class="login-container">
  <div class="login-card">
    <h2>Registro</h2>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          id="username" 
          type="text" 
          formControlName="username" 
          placeholder="Ingresa un usuario"
        />
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="Ingresa tu correo"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="Ingresa una contraseña"
        />
      </div>

      <div *ngIf="errorMessage" class="error-alert">
        {{ errorMessage }}
      </div>
      
      <div *ngIf="successMessage" class="success-alert" style="color: #155724; background-color: #d4edda; padding: 0.75rem; border-radius: 4px; margin-top: 1rem; font-size: 0.875rem;">
        {{ successMessage }}
      </div>

      <button type="submit" [disabled]="registerForm.invalid">Registrarse</button>
      
      <div style="text-align: center; margin-top: 15px; font-size: 14px;">
        <a routerLink="/login" style="color: #007bff; text-decoration: none;">¿Ya tienes cuenta? Inicia Sesión</a>
      </div>
    </form>
  </div>
</div>
